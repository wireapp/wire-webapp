# Default values for the webapp.
replicaCount: 1
resources:
  requests:
    memory: '128Mi'
    cpu: '100m'
  limits:
    memory: '512Mi'
    cpu: '1'
image:
  repository: quay.io/wire/webapp
  # tag: override version defined in Chart.appVersion

# Keep resource names backwards compatible by default. Set to true to append
# the Helm release name to resource names so multiple installations can
# coexist in the same namespace.
appendReleaseNameToResources: false

# webappDomain: webapp.example.com

ingress:
  enabled: false
  # Controller mode for web traffic:
  # - nginx: render only a Kubernetes Ingress
  # - envoy: render only a Gateway API HTTPRoute
  # - migration: render both and split external-dns weights between them
  mode: nginx
  className: nginx
  gateway:
    # Envoy Gateway / Gateway API expectations when ingress.mode is envoy or migration:
    # - Envoy Gateway v1.7.0 or newer is required for ListenerSet support.
    # - ListenerSet is experimental in Envoy Gateway and must be enabled with the
    #   `XListenerSet` feature flag in the EnvoyGateway configuration.
    # - A Gateway (gateway.networking.k8s.io/v1) must already exist, or be created separately.
    # - spec.gatewayClassName must point at the Envoy Gateway GatewayClass.
    # - spec.allowedListeners must allow ListenerSet attachments from this chart's namespace.
    #   `namespaces.from: All` is the broadest choice if you want to permit any namespace.
    # Example:
    # apiVersion: gateway.networking.k8s.io/v1
    # kind: Gateway
    # metadata:
    #   name: envoy-gateway
    # spec:
    #   gatewayClassName: envoy-gateway # use the GatewayClass installed by Envoy Gateway
    #   allowedListeners:
    #     namespaces:
    #       from: All
    #   listeners:
    #     - name: http
    #       protocol: HTTP
    #       port: 80
    # - This chart creates a ListenerSet in the release namespace and an HTTPRoute that
    #   attaches to it.
    # - If tls.useCertManager=true and you rely on the default HTTP01 solver, the Gateway
    #   must also expose an HTTP listener on port 80, or you must provide custom solvers.
    # Gateway name used when ingress.mode is envoy or migration.
    name: ""
    # Optional namespace of the Gateway. Defaults to the release namespace.
    namespace: ""
    # Listener section name used by the ListenerSet and HTTPRoute parentRef.
    # Defaults to https when tls.enabled=true, otherwise http.
    sectionName: ""
  migration:
    # Which controller should receive external-dns weight 100 during migration.
    # The other resource receives weight 0.
    primary: nginx
  # Ingress-specific annotations.
  annotations: {}
  # HTTPRoute-specific annotations.
  httpRouteAnnotations: {}
  # nginx-only override for proxy-side CSP injection. The webapp server already
  # emits CSP headers itself, so Envoy mode does not need a proxy-side CSP path.
  renderCSPInIngress: false

tls:
  enabled: false
  useCertManager: false
  createIssuer: false
  # existingSecretName: "" # set this if you created e.g. a wildcard cert outside this chart
  issuer:
    name: letsencrypt
    kind: ClusterIssuer

certManager:
  inTestMode: false
  certmasterEmail:
  customSolvers:

service:
  https:
    externalPort: 443
  http:
    internalPort: 8080

## The following has to be provided to deploy this chart

#config:
#  externalUrls:
#   backendRest: nginz-https.example.com
#   backendWebsocket: nginz-ssl.example.com
#   backendDomain: example.com
#   appHost: webapp.example.com

# Some relevant environment options. For a comprehensive
# list of available variables, please refer to:
# https://github.com/wireapp/wire-web-config-wire/blob/master/wire-webapp/.env.defaults
#
# NOTE: Without an empty dictionary, you will see warnings
#       when overriding envVars
envVars: {}
# E.g.
# envVars:
#   FEATURE_ENABLE_DEBUG: "true"
#   You are likely to need at least following CSP headers
#   due to the fact that you are likely to do cross sub-domain requests
#   i.e., from webapp.example.com to nginz-https.example.com
#   CSP_EXTRA_CONNECT_SRC: "https://*.example.com, wss://*.example.com"
#   CSP_EXTRA_IMG_SRC: "https://*.example.com"
#   CSP_EXTRA_SCRIPT_SRC: "https://*.example.com"
#   CSP_EXTRA_DEFAULT_SRC: "https://*.example.com"
#   CSP_EXTRA_FONT_SRC: "https://*.example.com"
#   CSP_EXTRA_FRAME_SRC: "https://*.example.com"
#   CSP_EXTRA_MANIFEST_SRC: "https://*.example.com"
#   CSP_EXTRA_OBJECT_SRC: "https://*.example.com"
#   CSP_EXTRA_MEDIA_SRC: "https://*.example.com"
#   CSP_EXTRA_PREFETCH_SRC: "https://*.example.com"
#   CSP_EXTRA_STYLE_SRC: "https://*.example.com"
#   CSP_EXTRA_WORKER_SRC: "https://*.example.com"

podSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
