---
name: Deliver main

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Optional reason for manually delivering main to Edge, Hosted Dev, and the development channel'
        required: false
        type: string
      confirm_main_publish:
        description: 'Confirm that this will deploy Edge and Hosted Dev, then publish the dev Docker image, Helm chart, and wire-builds/dev channel'
        required: true
        default: false
        type: boolean

env:
  AWS_REGION: eu-central-1
  BUILD_ARTIFACT_PATH: apps/server/dist/s3/ebs.zip
  EDGE_ENVIRONMENT_NAME: wire-webapp-edge
  EDGE_WEBAPP_URL: https://wire-webapp-edge.wire.com/
  EDGE_RUNTIME_BACKEND_REST: https://prod-nginz-https.wire.com
  EDGE_RUNTIME_BACKEND_WS: wss://prod-nginz-ssl.wire.com
  DEV_ELASTIC_BEANSTALK_ENVIRONMENT_NAME: wire-webapp-dev
  DEV_WEBAPP_URL: https://wire-webapp-dev.zinfra.io/
  DEV_RUNTIME_BACKEND_REST: https://staging-nginz-https.zinfra.io/
  DEV_RUNTIME_BACKEND_WS: wss://staging-nginz-ssl.zinfra.io/
  DOCKER_REPOSITORY: quay.io/wire/webapp
  CHART_REPOSITORY_NAME: charts-webapp
  CHART_REPOSITORY_URL: s3://public.wire.com/charts-webapp
  WIRE_BUILDS_REPOSITORY: wireapp/wire-builds

jobs:
  validate_request:
    name: Validate main delivery request
    runs-on: ubuntu-24.04
    permissions: {}

    steps:
      - name: Validate request
        env:
          CONFIRM_MAIN_PUBLISH: ${{ inputs.confirm_main_publish }}
          WORKFLOW_DISPATCH_REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail

          {
            echo '## Main delivery request'
            echo "- Requested ref: ${GITHUB_REF}"
            echo "- Commit SHA: ${GITHUB_SHA}"
            echo "- Workflow run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

            if [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' && -n "${WORKFLOW_DISPATCH_REASON}" ]]; then
              echo "- Manual reason: ${WORKFLOW_DISPATCH_REASON}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' ]]; then
            if [[ "${GITHUB_REF}" != 'refs/heads/main' ]]; then
              echo "Manual main delivery must run from refs/heads/main, received ${GITHUB_REF}." >&2
              exit 1
            fi

            if [[ "${CONFIRM_MAIN_PUBLISH}" != 'true' ]]; then
              echo 'Main delivery was not confirmed. Aborting.' >&2
              exit 1
            fi
          fi

  build_main_artifacts:
    name: Build main delivery artifacts
    runs-on: ubuntu-24.04
    needs: validate_request
    concurrency:
      group: build-main-delivery
      cancel-in-progress: true
    permissions:
      contents: read
    outputs:
      main_artifact_name: ${{ steps.prepare_artifact.outputs.main_artifact_name }}
      artifact_version: ${{ steps.validate_artifact_metadata.outputs.artifact_version }}
      artifact_asset_version: ${{ steps.validate_artifact_metadata.outputs.artifact_asset_version }}
      artifact_commit: ${{ steps.validate_artifact_metadata.outputs.artifact_commit }}
      artifact_built_at: ${{ steps.validate_artifact_metadata.outputs.artifact_built_at }}
      development_context_artifact_name: ${{ steps.prepare_artifact.outputs.development_context_artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Add repository Yarn wrapper to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: ./bin/yarn --immutable

      - name: Update configuration
        run: ./bin/yarn nx run webapp:configure

      - name: Resolve main webapp build metadata inputs
        id: build_metadata_inputs
        shell: bash
        run: |
          set -euo pipefail

          echo "version=main-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and package internal application
        env:
          WIRE_WEBAPP_BUILD_COMMIT: ${{ steps.build_metadata_inputs.outputs.commit }}
          WIRE_WEBAPP_BUILD_VERSION: ${{ steps.build_metadata_inputs.outputs.version }}
        run: |
          ./bin/yarn build:prod

      - name: Validate main artifact metadata
        id: validate_artifact_metadata
        env:
          BUILD_ARTIFACT_PATH: ${{ env.BUILD_ARTIFACT_PATH }}
          EXPECTED_COMMIT: ${{ steps.build_metadata_inputs.outputs.commit }}
          EXPECTED_VERSION: ${{ steps.build_metadata_inputs.outputs.version }}
        run: node ./bin/validateBuildArtifact.mts

      - name: Prepare shared main artifact metadata and exact development Docker context
        id: prepare_artifact
        shell: bash
        env:
          BUILD_ARTIFACT_PATH: ${{ env.BUILD_ARTIFACT_PATH }}
        run: |
          set -euo pipefail

          main_artifact_name="main-artifact-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          development_context_artifact_name="main-development-context-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          development_context_directory="${RUNNER_TEMP}/${development_context_artifact_name}"

          mkdir -p \
            "${development_context_directory}/apps/server" \
            "${development_context_directory}/libraries/config" \
            "${development_context_directory}/bin"

          cp -a package.json yarn.lock .yarnrc.yml .npmrc run.sh .env.defaults "${development_context_directory}/"
          cp -a .yarn "${development_context_directory}/.yarn"
          cp -a bin/yarn "${development_context_directory}/bin/yarn"
          cp -a apps/server/Dockerfile apps/server/package.json "${development_context_directory}/apps/server/"
          cp -a apps/server/dist "${development_context_directory}/apps/server/dist"
          cp -a libraries/config/package.json libraries/config/lib "${development_context_directory}/libraries/config/"

          test -s "${development_context_directory}/package.json"
          test -s "${development_context_directory}/apps/server/Dockerfile"
          test -d "${development_context_directory}/apps/server/dist"
          test -d "${development_context_directory}/libraries/config/lib"

          {
            echo "main_artifact_name=${main_artifact_name}"
            echo "development_context_artifact_name=${development_context_artifact_name}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload shared main artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ steps.prepare_artifact.outputs.main_artifact_name }}
          path: ${{ env.BUILD_ARTIFACT_PATH }}
          if-no-files-found: error

      - name: Upload exact development Docker context
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ steps.prepare_artifact.outputs.development_context_artifact_name }}
          path: ${{ runner.temp }}/${{ steps.prepare_artifact.outputs.development_context_artifact_name }}
          if-no-files-found: error
          include-hidden-files: true

  deploy_to_edge:
    name: Deploy to Edge
    runs-on: ubuntu-24.04
    needs: build_main_artifacts
    permissions:
      contents: read
    concurrency:
      group: deploy-webapp-edge
      cancel-in-progress: false
    outputs:
      superseded: ${{ steps.check_latest_main.outputs.superseded }}
    # ADR 0002 requires Edge to deploy without an approval gate, so the
    # wire-webapp-edge repository environment must not require reviewers.
    environment:
      name: wire-webapp-edge
      url: ${{ env.EDGE_WEBAPP_URL }}

    steps:
      - name: Check whether this Edge deployment is current
        id: check_latest_main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          latest_main_sha="$(
            gh api \
              "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
              --jq '.object.sha'
          )"

          if [[ -z "${latest_main_sha}" ]]; then
            echo 'Unable to resolve the current main SHA.' >&2
            exit 1
          fi

          if [[ "${GITHUB_SHA}" != "${latest_main_sha}" ]]; then
            echo "Skipping Edge deployment because ${GITHUB_SHA} was superseded by ${latest_main_sha}."

            echo 'superseded=true' >> "${GITHUB_OUTPUT}"
            echo 'deploy_allowed=false' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo 'superseded=false' >> "${GITHUB_OUTPUT}"
          echo 'deploy_allowed=true' >> "${GITHUB_OUTPUT}"

      - name: Download shared main artifact
        if: ${{ steps.check_latest_main.outputs.deploy_allowed == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ needs.build_main_artifacts.outputs.main_artifact_name }}
          path: edge-artifact

      - name: Configure AWS credentials
        if: ${{ steps.check_latest_main.outputs.deploy_allowed == 'true' }}
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          aws-access-key-id: ${{ secrets.WEBTEAM_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.WEBTEAM_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to wire-webapp-edge
        id: deploy
        if: ${{ steps.check_latest_main.outputs.deploy_allowed == 'true' }}
        uses: aws-actions/aws-elasticbeanstalk-deploy@1f56e4e813ae4eb167e69ca324234c336c1df573
        with:
          aws-region: ${{ env.AWS_REGION }}
          application-name: Webapp
          environment-name: ${{ env.EDGE_ENVIRONMENT_NAME }}
          version-label: ${{ github.run_id }}-${{ github.run_attempt }}-edge
          deployment-package-path: edge-artifact/ebs.zip
          wait-for-deployment: true
          wait-for-environment-recovery: true
          deployment-timeout: 150
          use-existing-application-version-if-available: true

      - name: Summarize Edge deployment
        if: always()
        env:
          ARTIFACT_BUILT_AT: ${{ needs.build_main_artifacts.outputs.artifact_built_at }}
          ARTIFACT_COMMIT: ${{ needs.build_main_artifacts.outputs.artifact_commit }}
          ARTIFACT_VERSION: ${{ needs.build_main_artifacts.outputs.artifact_version }}
          ARTIFACT_ASSET_VERSION: ${{ needs.build_main_artifacts.outputs.artifact_asset_version }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          EDGE_RUNTIME_BACKEND_REST: ${{ env.EDGE_RUNTIME_BACKEND_REST }}
          EDGE_RUNTIME_BACKEND_WS: ${{ env.EDGE_RUNTIME_BACKEND_WS }}
          EDGE_WEBAPP_URL: ${{ env.EDGE_WEBAPP_URL }}
          SUPERSEDED: ${{ steps.check_latest_main.outputs.superseded }}
          WORKFLOW_DISPATCH_REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail

          if [[ "${SUPERSEDED:-false}" == 'true' ]]; then
            edge_result='skipped as superseded'
          elif [[ "${DEPLOY_OUTCOME:-}" == 'success' ]]; then
            edge_result='deployed successfully'
          else
            edge_result='failed'
          fi

          if [[ -n "${ARTIFACT_COMMIT:-}" ]]; then
            artifact_commit_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${ARTIFACT_COMMIT}"
            artifact_commit_display="[${ARTIFACT_COMMIT}](${artifact_commit_url})"
          else
            artifact_commit_display='not available'
          fi

          workflow_run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          {
            echo '## Edge deployment'
            echo
            echo "- Result: ${edge_result}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- Webapp version: ${ARTIFACT_VERSION:-not available}"
            echo "- Asset version: ${ARTIFACT_ASSET_VERSION:-not available}"
            echo "- Commit SHA: ${artifact_commit_display}"
            echo "- Built at (UTC): ${ARTIFACT_BUILT_AT:-not available}"
            echo "- Target environment: ${EDGE_ENVIRONMENT_NAME}"
            echo "- Frontend URL: [${EDGE_WEBAPP_URL}](${EDGE_WEBAPP_URL})"
            echo "- REST backend URL: ${EDGE_RUNTIME_BACKEND_REST}"
            echo "- WebSocket backend URL: ${EDGE_RUNTIME_BACKEND_WS}"
            echo "- Workflow run URL: [${workflow_run_url}](${workflow_run_url})"

            if [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' && -n "${WORKFLOW_DISPATCH_REASON}" ]]; then
              echo "- Manual reason: ${WORKFLOW_DISPATCH_REASON}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_to_dev:
    name: Deploy to Hosted Dev
    runs-on: ubuntu-24.04
    needs: build_main_artifacts
    permissions:
      contents: read
    concurrency:
      group: deploy-webapp-dev
      cancel-in-progress: false
    outputs:
      superseded: ${{ steps.check_latest_main.outputs.superseded }}
    environment:
      name: wire-webapp-dev
      url: ${{ env.DEV_WEBAPP_URL }}

    steps:
      - name: Check whether this Hosted Dev deployment is current
        id: check_latest_main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          latest_main_sha="$(
            gh api \
              "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
              --jq '.object.sha'
          )"

          if [[ -z "${latest_main_sha}" ]]; then
            echo 'Unable to resolve the current main SHA.' >&2
            exit 1
          fi

          if [[ "${GITHUB_SHA}" != "${latest_main_sha}" ]]; then
            echo "Skipping Hosted Dev deployment because ${GITHUB_SHA} was superseded by ${latest_main_sha}."

            echo 'superseded=true' >> "${GITHUB_OUTPUT}"
            echo 'deploy_allowed=false' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo 'superseded=false' >> "${GITHUB_OUTPUT}"
          echo 'deploy_allowed=true' >> "${GITHUB_OUTPUT}"

      - name: Checkout runtime verification action
        if: ${{ steps.check_latest_main.outputs.deploy_allowed == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          sparse-checkout: |
            .nvmrc
            .github/actions/verify-webapp-runtime
            bin/validateRuntimeResponses.mts
            bin/validateRuntimeResponses.ts
          sparse-checkout-cone-mode: false

      - name: Setup Node.js for runtime verification
        if: ${{ steps.check_latest_main.outputs.deploy_allowed == 'true' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'

      - name: Download shared main artifact
        if: ${{ steps.check_latest_main.outputs.deploy_allowed == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ needs.build_main_artifacts.outputs.main_artifact_name }}
          path: dev-artifact

      - name: Configure AWS credentials
        if: ${{ steps.check_latest_main.outputs.deploy_allowed == 'true' }}
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          aws-access-key-id: ${{ secrets.WEBTEAM_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.WEBTEAM_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to wire-webapp-dev
        id: deploy
        if: ${{ steps.check_latest_main.outputs.deploy_allowed == 'true' }}
        uses: aws-actions/aws-elasticbeanstalk-deploy@1f56e4e813ae4eb167e69ca324234c336c1df573
        with:
          aws-region: ${{ env.AWS_REGION }}
          application-name: Webapp
          environment-name: ${{ env.DEV_ELASTIC_BEANSTALK_ENVIRONMENT_NAME }}
          version-label: ${{ github.run_id }}-${{ github.run_attempt }}-dev
          deployment-package-path: dev-artifact/ebs.zip
          wait-for-deployment: true
          wait-for-environment-recovery: true
          deployment-timeout: 150
          use-existing-application-version-if-available: true

      - name: Verify Hosted Dev runtime
        id: verify_runtime
        if: ${{ steps.check_latest_main.outputs.deploy_allowed == 'true' }}
        uses: ./.github/actions/verify-webapp-runtime
        with:
          environment-label: Hosted Dev
          webapp-url: ${{ env.DEV_WEBAPP_URL }}
          expected-version: ${{ needs.build_main_artifacts.outputs.artifact_version }}
          expected-asset-version: ${{ needs.build_main_artifacts.outputs.artifact_asset_version }}
          expected-commit: ${{ needs.build_main_artifacts.outputs.artifact_commit }}
          expected-built-at: ${{ needs.build_main_artifacts.outputs.artifact_built_at }}
          expected-backend-rest: ${{ env.DEV_RUNTIME_BACKEND_REST }}
          expected-backend-ws: ${{ env.DEV_RUNTIME_BACKEND_WS }}

      - name: Summarize Hosted Dev deployment
        if: always()
        env:
          ARTIFACT_BUILT_AT: ${{ needs.build_main_artifacts.outputs.artifact_built_at }}
          ARTIFACT_COMMIT: ${{ needs.build_main_artifacts.outputs.artifact_commit }}
          ARTIFACT_VERSION: ${{ needs.build_main_artifacts.outputs.artifact_version }}
          ARTIFACT_ASSET_VERSION: ${{ needs.build_main_artifacts.outputs.artifact_asset_version }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          DEV_RUNTIME_BACKEND_REST: ${{ env.DEV_RUNTIME_BACKEND_REST }}
          DEV_RUNTIME_BACKEND_WS: ${{ env.DEV_RUNTIME_BACKEND_WS }}
          DEV_WEBAPP_URL: ${{ env.DEV_WEBAPP_URL }}
          VERIFY_OUTCOME: ${{ steps.verify_runtime.outcome }}
          SUPERSEDED: ${{ steps.check_latest_main.outputs.superseded }}
          WORKFLOW_DISPATCH_REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail

          if [[ "${SUPERSEDED:-false}" == 'true' ]]; then
            dev_result='skipped as superseded'
          elif [[ "${DEPLOY_OUTCOME:-}" == 'success' && "${VERIFY_OUTCOME:-}" == 'success' ]]; then
            dev_result='deployed and verified successfully'
          else
            dev_result='failed'
          fi

          if [[ -n "${ARTIFACT_COMMIT:-}" ]]; then
            artifact_commit_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${ARTIFACT_COMMIT}"
            artifact_commit_display="[${ARTIFACT_COMMIT}](${artifact_commit_url})"
          else
            artifact_commit_display='not available'
          fi

          workflow_run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          {
            echo '## Hosted Dev deployment'
            echo
            echo "- Result: ${dev_result}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- Webapp version: ${ARTIFACT_VERSION:-not available}"
            echo "- Asset version: ${ARTIFACT_ASSET_VERSION:-not available}"
            echo "- Commit SHA: ${artifact_commit_display}"
            echo "- Built at (UTC): ${ARTIFACT_BUILT_AT:-not available}"
            echo "- Target environment: ${DEV_ELASTIC_BEANSTALK_ENVIRONMENT_NAME}"
            echo "- Frontend URL: [${DEV_WEBAPP_URL}](${DEV_WEBAPP_URL})"
            echo "- REST backend URL: ${DEV_RUNTIME_BACKEND_REST}"
            echo "- WebSocket backend URL: ${DEV_RUNTIME_BACKEND_WS}"
            echo "- Workflow run URL: [${workflow_run_url}](${workflow_run_url})"

            if [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' && -n "${WORKFLOW_DISPATCH_REASON}" ]]; then
              echo "- Manual reason: ${WORKFLOW_DISPATCH_REASON}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish_to_development_channel:
    name: Publish to development channel
    runs-on: ubuntu-24.04
    needs: build_main_artifacts
    permissions:
      actions: read
      contents: read
    concurrency:
      group: publish-webapp-distribution
      cancel-in-progress: false
      queue: max
    outputs:
      docker_image_tag: ${{ steps.publish_docker.outputs.docker_image_tag }}
      helm_chart_version: ${{ steps.publish_helm.outputs.helm_chart_version }}
      wire_builds_commit_sha: ${{ steps.update_wire_builds.outputs.wire_builds_commit_sha }}
      superseded: ${{ steps.check_latest_main.outputs.superseded }}

    steps:
      - name: Checkout exact main commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Download exact development Docker context
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ needs.build_main_artifacts.outputs.development_context_artifact_name }}
          path: main-development-context

      - name: Add repository Yarn wrapper to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install exact repository dependencies
        run: ./bin/yarn --immutable

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
        with:
          version: '3.21.3'

      - name: Check whether this main delivery is current
        id: check_latest_main
        shell: bash
        run: |
          set -euo pipefail

          latest_main_sha="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          if [[ -z "${latest_main_sha}" ]]; then
            echo 'Unable to resolve the current origin/main SHA.' >&2
            exit 1
          fi

          if [[ "${GITHUB_SHA}" != "${latest_main_sha}" ]]; then
            echo "Skipping development channel delivery because ${GITHUB_SHA} was superseded by ${latest_main_sha}."
            echo 'superseded=true' >> "$GITHUB_OUTPUT"
            echo 'publish_allowed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo 'superseded=false' >> "$GITHUB_OUTPUT"
          echo 'publish_allowed=true' >> "$GITHUB_OUTPUT"

      - name: Publish or reuse dev Docker image
        id: publish_docker
        if: ${{ steps.check_latest_main.outputs.publish_allowed == 'true' }}
        env:
          DOCKER_PASSWORD: ${{ secrets.WEBTEAM_QUAY_PASSWORD }}
          DOCKER_USERNAME: ${{ secrets.WEBTEAM_QUAY_USERNAME }}
          DOCKER_REPOSITORY: ${{ env.DOCKER_REPOSITORY }}
          DOCKER_IMAGE_TAG_OUTPUT_PATH: ${{ runner.temp }}/main-development-image-tag.txt
          WIRE_WEBAPP_RELEASE_COMMIT_SHA: ${{ github.sha }}
          WIRE_WEBAPP_DOCKER_CONTEXT_PATH: ${{ github.workspace }}/main-development-context
        run: ./bin/publish-development-docker.sh

      - name: Publish or reuse dev Helm chart
        id: publish_helm
        if: ${{ steps.check_latest_main.outputs.publish_allowed == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CHARTS_WEBAPP_AUTOMATION_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CHARTS_WEBAPP_AUTOMATION_AWS_SECRET_ACCESS_KEY }}
          DOCKER_IMAGE_TAG: ${{ steps.publish_docker.outputs.docker_image_tag }}
          CHART_REPOSITORY_NAME: ${{ env.CHART_REPOSITORY_NAME }}
          CHART_REPOSITORY_URL: ${{ env.CHART_REPOSITORY_URL }}
        run: ./bin/publish-development-helm.sh

      - name: Check out wire-builds dev
        if: ${{ steps.check_latest_main.outputs.publish_allowed == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ env.WIRE_BUILDS_REPOSITORY }}
          token: ${{ secrets.WIRE_BUILDS_WRITE_ACCESS_GH_TOKEN }}
          ref: dev
          path: wire-builds
          fetch-depth: 1

      - name: Update wire-builds dev idempotently
        id: update_wire_builds
        if: ${{ steps.check_latest_main.outputs.publish_allowed == 'true' }}
        env:
          DOCKER_IMAGE_TAG: ${{ steps.publish_docker.outputs.docker_image_tag }}
          HELM_CHART_VERSION: ${{ steps.publish_helm.outputs.helm_chart_version }}
          RELEASE_COMMIT_SHA: ${{ github.sha }}
        working-directory: wire-builds
        run: ../bin/update-development-wire-builds.sh

      - name: Summarize development channel
        if: always()
        env:
          ARTIFACT_BUILT_AT: ${{ needs.build_main_artifacts.outputs.artifact_built_at }}
          ARTIFACT_COMMIT: ${{ needs.build_main_artifacts.outputs.artifact_commit }}
          ARTIFACT_VERSION: ${{ needs.build_main_artifacts.outputs.artifact_version }}
          ARTIFACT_ASSET_VERSION: ${{ needs.build_main_artifacts.outputs.artifact_asset_version }}
          CHART_REPOSITORY_URL: ${{ env.CHART_REPOSITORY_URL }}
          DOCKER_IMAGE_OUTCOME: ${{ steps.publish_docker.outcome }}
          DOCKER_IMAGE_TAG: ${{ steps.publish_docker.outputs.docker_image_tag }}
          DOCKER_REPOSITORY: ${{ env.DOCKER_REPOSITORY }}
          HELM_CHART_OUTCOME: ${{ steps.publish_helm.outcome }}
          HELM_CHART_VERSION: ${{ steps.publish_helm.outputs.helm_chart_version }}
          WIRE_BUILDS_COMMIT_OUTCOME: ${{ steps.update_wire_builds.outcome }}
          WIRE_BUILDS_COMMIT_SHA: ${{ steps.update_wire_builds.outputs.wire_builds_commit_sha }}
          WIRE_BUILDS_REPOSITORY: ${{ env.WIRE_BUILDS_REPOSITORY }}
          SUPERSEDED: ${{ steps.check_latest_main.outputs.superseded }}
          WORKFLOW_DISPATCH_REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail

          if [[ "${SUPERSEDED:-false}" == 'true' ]]; then
            channel_result='skipped as superseded'
          elif [[
            "${DOCKER_IMAGE_OUTCOME:-}" == 'success' &&
            "${HELM_CHART_OUTCOME:-}" == 'success' &&
            "${WIRE_BUILDS_COMMIT_OUTCOME:-}" == 'success'
          ]]; then
            channel_result='published successfully'
          else
            channel_result='failed'
          fi

          if [[ -n "${DOCKER_IMAGE_TAG:-}" ]]; then
            docker_image_reference="${DOCKER_REPOSITORY}:${DOCKER_IMAGE_TAG}"
          else
            docker_image_reference='not published'
          fi

          if [[ -n "${WIRE_BUILDS_COMMIT_SHA:-}" ]]; then
            wire_builds_commit_url="${GITHUB_SERVER_URL}/${WIRE_BUILDS_REPOSITORY}/commit/${WIRE_BUILDS_COMMIT_SHA}"
            wire_builds_commit="[${WIRE_BUILDS_COMMIT_SHA}](${wire_builds_commit_url})"
          else
            wire_builds_commit='not updated'
          fi

          if [[ -n "${ARTIFACT_COMMIT:-}" ]]; then
            artifact_commit_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${ARTIFACT_COMMIT}"
            artifact_commit_display="[${ARTIFACT_COMMIT}](${artifact_commit_url})"
          else
            artifact_commit_display='not available'
          fi

          workflow_run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          {
            echo '## Development channel'
            echo
            echo "- Result: ${channel_result}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- Webapp version: ${ARTIFACT_VERSION:-not available}"
            echo "- Asset version: ${ARTIFACT_ASSET_VERSION:-not available}"
            echo "- Commit SHA: ${artifact_commit_display}"
            echo "- Built at (UTC): ${ARTIFACT_BUILT_AT:-not available}"
            echo '- Target channel: dev'
            echo "- Docker image: ${docker_image_reference}"
            echo "- Helm chart repository: ${CHART_REPOSITORY_URL}"
            echo "- Helm chart version: ${HELM_CHART_VERSION:-not published}"
            echo "- wire-builds/dev commit: ${wire_builds_commit}"
            echo "- Workflow run URL: [${workflow_run_url}](${workflow_run_url})"

            if [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' && -n "${WORKFLOW_DISPATCH_REASON}" ]]; then
              echo "- Manual reason: ${WORKFLOW_DISPATCH_REASON}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  notify_main_delivery_failure:
    name: Notify Deployoholics of main delivery failure
    runs-on: ubuntu-24.04
    needs:
      - build_main_artifacts
      - deploy_to_edge
      - deploy_to_dev
      - publish_to_development_channel
    if: >-
      ${{
        always() &&
        (
          needs.build_main_artifacts.result == 'failure' ||
          needs.deploy_to_edge.result == 'failure' ||
          needs.deploy_to_dev.result == 'failure' ||
          needs.publish_to_development_channel.result == 'failure'
        )
      }}
    permissions:
      contents: read

    steps:
      - name: Checkout notification action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: .github/actions/notify-deployoholics

      - name: Announce main delivery failure
        uses: ./.github/actions/notify-deployoholics
        with:
          webhook-url: ${{ secrets.WIRE_DEPLOYOHOLICS_WEBHOOK_URL }}
          status: failure
          text: |
            ❌ Main delivery failed ❌
            **Main commit:** ${{ github.sha }}
            **Shared artifact build:** ${{ needs.build_main_artifacts.result }}
            **Edge deployment:** ${{ needs.deploy_to_edge.result }}
            **Hosted Dev deployment:** ${{ needs.deploy_to_dev.result }}
            **Development channel:** ${{ needs.publish_to_development_channel.result }}
            **Docker image:** ${{ needs.publish_to_development_channel.outputs.docker_image_tag || 'not published' }}
            **Helm chart:** ${{ needs.publish_to_development_channel.outputs.helm_chart_version || 'not published' }}
            **wire-builds/dev:** ${{ needs.publish_to_development_channel.outputs.wire_builds_commit_sha || 'not updated' }}
            **Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  summarize_main_delivery:
    name: Summarize main delivery
    runs-on: ubuntu-24.04
    needs:
      [
        build_main_artifacts,
        deploy_to_edge,
        deploy_to_dev,
        publish_to_development_channel,
        notify_main_delivery_failure,
      ]
    if: always()
    permissions: {}

    steps:
      - name: Write main delivery summary
        env:
          ARTIFACT_BUILT_AT: ${{ needs.build_main_artifacts.outputs.artifact_built_at }}
          ARTIFACT_COMMIT: ${{ needs.build_main_artifacts.outputs.artifact_commit }}
          ARTIFACT_VERSION: ${{ needs.build_main_artifacts.outputs.artifact_version }}
          ARTIFACT_ASSET_VERSION: ${{ needs.build_main_artifacts.outputs.artifact_asset_version }}
          EDGE_RESULT: ${{ needs.deploy_to_edge.result }}
          EDGE_RUNTIME_BACKEND_REST: ${{ env.EDGE_RUNTIME_BACKEND_REST }}
          EDGE_RUNTIME_BACKEND_WS: ${{ env.EDGE_RUNTIME_BACKEND_WS }}
          EDGE_WEBAPP_URL: ${{ env.EDGE_WEBAPP_URL }}
          EDGE_SUPERSEDED: ${{ needs.deploy_to_edge.outputs.superseded }}
          DEV_RESULT: ${{ needs.deploy_to_dev.result }}
          DEV_SUPERSEDED: ${{ needs.deploy_to_dev.outputs.superseded }}
          DEV_ELASTIC_BEANSTALK_ENVIRONMENT_NAME: ${{ env.DEV_ELASTIC_BEANSTALK_ENVIRONMENT_NAME }}
          DEV_WEBAPP_URL: ${{ env.DEV_WEBAPP_URL }}
          DEV_RUNTIME_BACKEND_REST: ${{ env.DEV_RUNTIME_BACKEND_REST }}
          DEV_RUNTIME_BACKEND_WS: ${{ env.DEV_RUNTIME_BACKEND_WS }}
          DOCKER_REPOSITORY: ${{ env.DOCKER_REPOSITORY }}
          DOCKER_IMAGE_TAG: ${{ needs.publish_to_development_channel.outputs.docker_image_tag }}
          DEVELOPMENT_CHANNEL_RESULT: ${{ needs.publish_to_development_channel.result }}
          HELM_CHART_VERSION: ${{ needs.publish_to_development_channel.outputs.helm_chart_version }}
          CHART_REPOSITORY_URL: ${{ env.CHART_REPOSITORY_URL }}
          WIRE_BUILDS_COMMIT_SHA: ${{ needs.publish_to_development_channel.outputs.wire_builds_commit_sha }}
          WIRE_BUILDS_REPOSITORY: ${{ env.WIRE_BUILDS_REPOSITORY }}
          DEVELOPMENT_CHANNEL_SUPERSEDED: ${{ needs.publish_to_development_channel.outputs.superseded }}
          WORKFLOW_DISPATCH_REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail

          if [[ "${EDGE_SUPERSEDED:-false}" == 'true' ]]; then
            edge_result='skipped as superseded'
          elif [[ "${EDGE_RESULT:-}" == 'success' ]]; then
            edge_result='deployed successfully'
          elif [[ "${EDGE_RESULT:-}" == 'skipped' ]]; then
            edge_result='did not run'
          elif [[ "${EDGE_RESULT:-}" == 'cancelled' ]]; then
            edge_result='cancelled'
          elif [[ "${EDGE_RESULT:-}" == 'failure' ]]; then
            edge_result='failed'
          else
            edge_result='unknown result'
          fi

          if [[ "${DEV_SUPERSEDED:-false}" == 'true' ]]; then
            dev_result='skipped as superseded'
          elif [[ "${DEV_RESULT:-}" == 'success' ]]; then
            dev_result='deployed and verified successfully'
          elif [[ "${DEV_RESULT:-}" == 'skipped' ]]; then
            dev_result='did not run'
          elif [[ "${DEV_RESULT:-}" == 'cancelled' ]]; then
            dev_result='cancelled'
          elif [[ "${DEV_RESULT:-}" == 'failure' ]]; then
            dev_result='failed'
          else
            dev_result='unknown result'
          fi

          if [[ "${DEVELOPMENT_CHANNEL_SUPERSEDED:-false}" == 'true' ]]; then
            channel_result='skipped as superseded'
          elif [[ "${DEVELOPMENT_CHANNEL_RESULT:-}" == 'success' ]]; then
            channel_result='published successfully'
          elif [[ "${DEVELOPMENT_CHANNEL_RESULT:-}" == 'skipped' ]]; then
            channel_result='did not run'
          elif [[ "${DEVELOPMENT_CHANNEL_RESULT:-}" == 'cancelled' ]]; then
            channel_result='cancelled'
          elif [[ "${DEVELOPMENT_CHANNEL_RESULT:-}" == 'failure' ]]; then
            channel_result='failed'
          else
            channel_result='unknown result'
          fi

          if [[ -n "${DOCKER_IMAGE_TAG:-}" ]]; then
            docker_image_reference="${DOCKER_REPOSITORY}:${DOCKER_IMAGE_TAG}"
          else
            docker_image_reference='not published'
          fi

          if [[ -n "${WIRE_BUILDS_COMMIT_SHA:-}" ]]; then
            wire_builds_commit_url="${GITHUB_SERVER_URL}/${WIRE_BUILDS_REPOSITORY}/commit/${WIRE_BUILDS_COMMIT_SHA}"
            wire_builds_commit="[${WIRE_BUILDS_COMMIT_SHA}](${wire_builds_commit_url})"
          else
            wire_builds_commit='not updated'
          fi

          if [[ -n "${ARTIFACT_COMMIT:-}" ]]; then
            artifact_commit_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${ARTIFACT_COMMIT}"
            artifact_commit_display="[${ARTIFACT_COMMIT}](${artifact_commit_url})"
          else
            artifact_commit_display='not available'
          fi

          workflow_run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          {
            echo '## Main delivery'
            echo
            echo "- Ref: ${GITHUB_REF}"
            echo "- Webapp version: ${ARTIFACT_VERSION:-not available}"
            echo "- Asset version: ${ARTIFACT_ASSET_VERSION:-not available}"
            echo "- Commit SHA: ${artifact_commit_display}"
            echo "- Built at (UTC): ${ARTIFACT_BUILT_AT:-not available}"
            echo "- Workflow run URL: [${workflow_run_url}](${workflow_run_url})"

            echo
            echo '### Edge deployment'
            echo
            echo "- Result: ${edge_result}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- Webapp version: ${ARTIFACT_VERSION:-not available}"
            echo "- Asset version: ${ARTIFACT_ASSET_VERSION:-not available}"
            echo "- Commit SHA: ${artifact_commit_display}"
            echo "- Built at (UTC): ${ARTIFACT_BUILT_AT:-not available}"
            echo "- Target environment: ${EDGE_ENVIRONMENT_NAME}"
            echo "- Frontend URL: [${EDGE_WEBAPP_URL}](${EDGE_WEBAPP_URL})"
            echo "- REST backend URL: ${EDGE_RUNTIME_BACKEND_REST}"
            echo "- WebSocket backend URL: ${EDGE_RUNTIME_BACKEND_WS}"
            echo "- Workflow run URL: [${workflow_run_url}](${workflow_run_url})"

            if [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' && -n "${WORKFLOW_DISPATCH_REASON}" ]]; then
              echo "- Manual reason: ${WORKFLOW_DISPATCH_REASON}"
            fi

            echo
            echo '### Hosted Dev deployment'
            echo
            echo "- Result: ${dev_result}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- Webapp version: ${ARTIFACT_VERSION:-not available}"
            echo "- Asset version: ${ARTIFACT_ASSET_VERSION:-not available}"
            echo "- Commit SHA: ${artifact_commit_display}"
            echo "- Built at (UTC): ${ARTIFACT_BUILT_AT:-not available}"
            echo "- Target environment: ${DEV_ELASTIC_BEANSTALK_ENVIRONMENT_NAME}"
            echo "- Frontend URL: [${DEV_WEBAPP_URL}](${DEV_WEBAPP_URL})"
            echo "- REST backend URL: ${DEV_RUNTIME_BACKEND_REST}"
            echo "- WebSocket backend URL: ${DEV_RUNTIME_BACKEND_WS}"
            echo "- Workflow run URL: [${workflow_run_url}](${workflow_run_url})"

            if [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' && -n "${WORKFLOW_DISPATCH_REASON}" ]]; then
              echo "- Manual reason: ${WORKFLOW_DISPATCH_REASON}"
            fi

            echo
            echo '### Development channel'
            echo
            echo "- Result: ${channel_result}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- Webapp version: ${ARTIFACT_VERSION:-not available}"
            echo "- Asset version: ${ARTIFACT_ASSET_VERSION:-not available}"
            echo "- Commit SHA: ${artifact_commit_display}"
            echo "- Built at (UTC): ${ARTIFACT_BUILT_AT:-not available}"
            echo '- Target channel: dev'
            echo "- Docker image: ${docker_image_reference}"
            echo "- Helm chart repository: ${CHART_REPOSITORY_URL}"
            echo "- Helm chart version: ${HELM_CHART_VERSION:-not published}"
            echo "- wire-builds/dev commit: ${wire_builds_commit}"
            echo "- Workflow run URL: [${workflow_run_url}](${workflow_run_url})"

            if [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' && -n "${WORKFLOW_DISPATCH_REASON}" ]]; then
              echo "- Manual reason: ${WORKFLOW_DISPATCH_REASON}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
