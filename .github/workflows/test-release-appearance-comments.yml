---
name: '⚠️ TEST ONLY — Release appearance comments (NO DEPLOYMENT)'

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Release stage to validate. This workflow performs no Beta or Production deployment.'
        required: true
        type: choice
        options:
          - beta
          - production
      deployment_tag:
        description: 'Existing immutable Beta or Production tag. No tag is created or changed.'
        required: true
        type: string
      release_commit_sha:
        description: 'Optional full commit SHA. When supplied, it must match deployment_tag exactly.'
        required: false
        type: string
      baseline_tag:
        description: 'Optional historical baseline override. It must be a valid, reachable existing tag.'
        required: false
        type: string
      test_mode:
        description: 'dry-run is read-only; single-pull-request-live-test writes only one fixed test-marker comment.'
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - single-pull-request-live-test
      pull_request_number:
        description: 'Existing pull request for the controlled live test. Leave empty for a historical dry run.'
        required: false
        type: number
      confirm_live_write:
        description: 'Explicitly confirm the single test-comment write. It must remain false for dry-run.'
        required: true
        default: false
        type: boolean
      reason:
        description: 'Optional reason for this no-deployment validation run.'
        required: false
        type: string

concurrency:
  group: release-appearance-comment-test-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  historical_dry_run:
    name: Historical dry run (read-only, NO DEPLOYMENT)
    if: ${{ inputs.test_mode == 'dry-run' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
      issues: read

    steps:
      - name: Checkout complete release history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Add repository Yarn wrapper to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: ./bin/yarn --immutable

      - name: Validate historical test inputs and resolve release commit
        id: resolve_release_commit
        env:
          BASELINE_TAG: ${{ inputs.baseline_tag }}
          CONFIRM_LIVE_WRITE: ${{ inputs.confirm_live_write }}
          DEPLOYMENT_TAG: ${{ inputs.deployment_tag }}
          RELEASE_COMMIT_SHA_INPUT: ${{ inputs.release_commit_sha }}
          STAGE: ${{ inputs.stage }}
          TEST_MODE: ${{ inputs.test_mode }}
          PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
        run: |
          set -euo pipefail

          if [[ "${TEST_MODE}" != 'dry-run' ]]; then
            echo 'Historical dry run received an incompatible test mode.' >&2
            exit 1
          fi

          if [[ -n "${PULL_REQUEST_NUMBER//[[:space:]]/}" ]]; then
            echo 'pull_request_number must be empty during a historical dry run.' >&2
            exit 1
          fi

          if [[ "${CONFIRM_LIVE_WRITE}" == 'true' ]]; then
            echo 'confirm_live_write must remain false during a historical dry run.' >&2
            exit 1
          fi

          if [[ "${STAGE}" == 'beta' ]]; then
            tag_pattern='^[0-9]{4}-[0-9]{2}-[0-9]{2}\.[1-9][0-9]*-beta\.[1-9][0-9]*$'
          elif [[ "${STAGE}" == 'production' ]]; then
            tag_pattern='^([0-9]{4}-[0-9]{2}-[0-9]{2}\.[1-9][0-9]*-production|[0-9]{4}-[0-9]{2}-[0-9]{2}-production\.[0-9]+)$'
          else
            echo "Unsupported stage: ${STAGE}" >&2
            exit 1
          fi

          if [[ ! "${DEPLOYMENT_TAG}" =~ ${tag_pattern} ]]; then
            echo "deployment_tag does not match ${STAGE}: ${DEPLOYMENT_TAG}" >&2
            exit 1
          fi

          git fetch --force --tags origin

          if [[ "$(git cat-file -t "refs/tags/${DEPLOYMENT_TAG}" 2>/dev/null || true)" != 'tag' ]]; then
            echo "deployment_tag must resolve to an existing annotated tag: ${DEPLOYMENT_TAG}" >&2
            exit 1
          fi

          deployment_commit_sha="$(git rev-parse "refs/tags/${DEPLOYMENT_TAG}^{commit}")"
          release_commit_sha="${RELEASE_COMMIT_SHA_INPUT}"

          if [[ -z "${release_commit_sha//[[:space:]]/}" ]]; then
            release_commit_sha="${deployment_commit_sha}"
          elif [[ ! "${release_commit_sha}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo 'release_commit_sha must be a full 40-character commit SHA.' >&2
            exit 1
          elif [[ "${release_commit_sha}" != "${deployment_commit_sha}" ]]; then
            echo "release_commit_sha ${release_commit_sha} does not match ${DEPLOYMENT_TAG} at ${deployment_commit_sha}." >&2
            exit 1
          fi

          {
            echo "deployment_commit_sha=${deployment_commit_sha}"
            echo "release_commit_sha=${release_commit_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Run the production release-appearance CLI in dry-run mode
        env:
          BASELINE_TAG: ${{ inputs.baseline_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_COMMIT_SHA: ${{ steps.resolve_release_commit.outputs.release_commit_sha }}
          RELEASE_TAG_NAME: ${{ inputs.deployment_tag }}
          STAGE: ${{ inputs.stage }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          cli_arguments=(
            "${STAGE}"
            "${RELEASE_TAG_NAME}"
            "${RELEASE_COMMIT_SHA}"
            "${WORKFLOW_RUN_URL}"
            '--dry-run'
            '--comment-mode'
            'production'
          )

          if [[ -n "${BASELINE_TAG//[[:space:]]/}" ]]; then
            cli_arguments+=('--baseline-tag' "${BASELINE_TAG}")
          fi

          node ./bin/releaseAppearanceCli.ts "${cli_arguments[@]}"

      - name: Add historical dry-run context and safety summary
        if: ${{ always() }}
        env:
          BASELINE_TAG: ${{ inputs.baseline_tag }}
          DEPLOYMENT_TAG: ${{ inputs.deployment_tag }}
          RELEASE_COMMIT_SHA: ${{ steps.resolve_release_commit.outputs.release_commit_sha }}
          REASON: ${{ inputs.reason }}
          STAGE: ${{ inputs.stage }}
        run: |
          set -euo pipefail

          {
            echo '## Release appearance validation context'
            echo '- Test mode: dry-run'
            echo "- Stage: ${STAGE}"
            echo "- Deployment tag: ${DEPLOYMENT_TAG}"
            echo "- Release commit: ${RELEASE_COMMIT_SHA:-unresolved}"
            echo "- Requested baseline override: ${BASELINE_TAG:-normal baseline selection}"
            echo "- Reason: ${REASON:-not supplied}"
            echo '- API writes: none; this job has read-only contents, pull-request, and issue permissions.'
            echo '- Deployment, tag creation, Docker, Helm, wire-builds, and Release WebApp triggering: none.'
          } >> "$GITHUB_STEP_SUMMARY"

  single_pull_request_live_test:
    name: Single pull-request live test (one test comment, NO DEPLOYMENT)
    if: ${{ inputs.test_mode == 'single-pull-request-live-test' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
      issues: write

    steps:
      - name: Checkout complete release history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Add repository Yarn wrapper to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: ./bin/yarn --immutable

      - name: Validate live-test confirmation, tag, commit, and pull request inputs
        id: resolve_release_commit
        env:
          BASELINE_TAG: ${{ inputs.baseline_tag }}
          CONFIRM_LIVE_WRITE: ${{ inputs.confirm_live_write }}
          DEPLOYMENT_TAG: ${{ inputs.deployment_tag }}
          PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
          RELEASE_COMMIT_SHA_INPUT: ${{ inputs.release_commit_sha }}
          STAGE: ${{ inputs.stage }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: |
          set -euo pipefail

          if [[ "${TEST_MODE}" != 'single-pull-request-live-test' ]]; then
            echo 'The live-test job received an incompatible test mode.' >&2
            exit 1
          fi

          if [[ "${CONFIRM_LIVE_WRITE}" != 'true' ]]; then
            echo 'confirm_live_write must be true for the single pull-request live test.' >&2
            exit 1
          fi

          if [[ ! "${PULL_REQUEST_NUMBER}" =~ ^[1-9][0-9]*$ ]]; then
            echo 'pull_request_number must be a positive integer for the single pull-request live test.' >&2
            exit 1
          fi

          if [[ -n "${BASELINE_TAG//[[:space:]]/}" ]]; then
            echo 'baseline_tag is only supported for historical dry runs.' >&2
            exit 1
          fi

          if [[ "${STAGE}" == 'beta' ]]; then
            tag_pattern='^[0-9]{4}-[0-9]{2}-[0-9]{2}\.[1-9][0-9]*-beta\.[1-9][0-9]*$'
          elif [[ "${STAGE}" == 'production' ]]; then
            tag_pattern='^([0-9]{4}-[0-9]{2}-[0-9]{2}\.[1-9][0-9]*-production|[0-9]{4}-[0-9]{2}-[0-9]{2}-production\.[0-9]+)$'
          else
            echo "Unsupported stage: ${STAGE}" >&2
            exit 1
          fi

          if [[ ! "${DEPLOYMENT_TAG}" =~ ${tag_pattern} ]]; then
            echo "deployment_tag does not match ${STAGE}: ${DEPLOYMENT_TAG}" >&2
            exit 1
          fi

          git fetch --force --tags origin

          if [[ "$(git cat-file -t "refs/tags/${DEPLOYMENT_TAG}" 2>/dev/null || true)" != 'tag' ]]; then
            echo "deployment_tag must resolve to an existing annotated tag: ${DEPLOYMENT_TAG}" >&2
            exit 1
          fi

          deployment_commit_sha="$(git rev-parse "refs/tags/${DEPLOYMENT_TAG}^{commit}")"
          release_commit_sha="${RELEASE_COMMIT_SHA_INPUT}"

          if [[ -z "${release_commit_sha//[[:space:]]/}" ]]; then
            release_commit_sha="${deployment_commit_sha}"
          elif [[ ! "${release_commit_sha}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo 'release_commit_sha must be a full 40-character commit SHA.' >&2
            exit 1
          elif [[ "${release_commit_sha}" != "${deployment_commit_sha}" ]]; then
            echo "release_commit_sha ${release_commit_sha} does not match ${DEPLOYMENT_TAG} at ${deployment_commit_sha}." >&2
            exit 1
          fi

          {
            echo "deployment_commit_sha=${deployment_commit_sha}"
            echo "release_commit_sha=${release_commit_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Run the production release-appearance CLI in fixed test-comment mode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
          RELEASE_COMMIT_SHA: ${{ steps.resolve_release_commit.outputs.release_commit_sha }}
          RELEASE_TAG_NAME: ${{ inputs.deployment_tag }}
          STAGE: ${{ inputs.stage }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          node ./bin/releaseAppearanceCli.ts \
            "${STAGE}" \
            "${RELEASE_TAG_NAME}" \
            "${RELEASE_COMMIT_SHA}" \
            "${WORKFLOW_RUN_URL}" \
            --comment-mode test \
            --pull-request-number "${PULL_REQUEST_NUMBER}"

      - name: Add controlled live-test context and safety summary
        if: ${{ always() }}
        env:
          DEPLOYMENT_TAG: ${{ inputs.deployment_tag }}
          PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
          RELEASE_COMMIT_SHA: ${{ steps.resolve_release_commit.outputs.release_commit_sha }}
          REASON: ${{ inputs.reason }}
          STAGE: ${{ inputs.stage }}
        run: |
          set -euo pipefail

          {
            echo '## Release appearance validation context'
            echo '- Test mode: single-pull-request-live-test'
            echo "- Stage: ${STAGE}"
            echo "- Deployment tag: ${DEPLOYMENT_TAG}"
            echo "- Release commit: ${RELEASE_COMMIT_SHA:-unresolved}"
            echo "- Explicit pull request: #${PULL_REQUEST_NUMBER}"
            echo "- Reason: ${REASON:-not supplied}"
            echo '- The only allowed write is one fixed test-marker comment on the selected pull request.'
            echo '- The production marker is never read for state transitions and is never modified by this mode.'
            echo '- No deployment, tag creation, Docker, Helm, wire-builds update, or Release WebApp trigger is present.'
            echo ''
            echo '### Supported live-test sequence'
            echo '1. Run with a Beta tag and the selected pull request.'
            echo '2. Confirm the test comment shows the first Beta tag and `Not yet deployed` for Production.'
            echo '3. Run again with a later Beta tag and confirm the original Beta tag remains unchanged.'
            echo '4. Run with a Production tag and confirm Production is added to the same test comment.'
            echo '5. Run again with a later Production tag and confirm the original Production tag remains unchanged.'
            echo '6. Remove the test comment manually after validation if desired.'
            echo ''
            echo 'The next normal Beta release remains the final integration verification; do not create an extra Beta solely for this test.'
          } >> "$GITHUB_STEP_SUMMARY"
