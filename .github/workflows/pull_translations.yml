name: Pull translations from crowdin

on:
  workflow_dispatch:

jobs:
  sync_translations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@d07a454dad7609a92316b57b23c9ccfd4f59af66
        with:
          access_token: ${{github.token}}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Authenticate git clone
        env:
          GH_TOKEN: ${{secrets.OTTO_THE_BOT_GH_TOKEN}}
        run: echo -e "machine github.com\n  login ${GH_TOKEN}" > ~/.netrc

      - name: Install JS dependencies
        run: yarn --immutable

      - name: Sync translations
        uses: crowdin/github-action@7ca9c452bfe9197d3bb7fa83a4d7e2b0c9ae835d
        env:
          GITHUB_TOKEN: ${{secrets.OTTO_THE_BOT_GH_TOKEN}}
          GITHUB_ACTOR: otto-the-bot
          CROWDIN_PROJECT_ID: 342359
          INPUT_DEBUG_MODE: true
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          push_translations: true
          create_pull_request: true
          localization_branch_name: 'pull_translations'
          pull_request_title: 'chore: Pull translations'
          commit_message: 'chore: Pull translations'
          token: ${{secrets.WEBTEAM_CROWDIN_TOKEN}}
          source: '/apps/webapp/src/i18n/en-US.json'
          translation: '/apps/webapp/src/i18n/%locale%.json'
          base_path: '.'
