name: Run Cells Critical Flow E2E Tests

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true
      WIRE_CELLS_E2E_TEST_BOT_WEBHOOK_URL:
        required: true

jobs:
  cells-crit-flow-e2e-tests:
    name: Run Playwright Cells Critical Flow Tests
    if: github.repository == 'wireapp/wire-webapp'
    runs-on: [self-hosted, Linux, X64, office]
    env:
      ENV: ${{ inputs.environment }}
      SLACK_WEBHOOK_URL: ${{ secrets.WIRE_CELLS_E2E_TEST_BOT_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack
        run: corepack enable

      - name: Install JS dependencies
        run: yarn --immutable

      - name: Install Playwright browsers
        run: yarn playwright install --only-shell --with-deps chromium

      - name: Install 1Password
        uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4

      - name: Generate env file
        run: op inject -i apps/webapp/test/e2e_tests/.env.$ENV.tpl -o apps/webapp/test/e2e_tests/.env
        env:
          ENV: ${{ inputs.environment }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      - name: Run critical flow tests
        run: yarn nx run webapp:e2e --grep "@crit-flow-cells"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report-${{ env.ENV }}
          path: apps/webapp/playwright-report/
      - name: Notify on Wire if succeeded
        if: success()
        continue-on-error: true
        uses: 8398a7/action-slack@293f8dc0f9731ac35321056641cdef895f4f65f8
        env:
          ENV: ${{ inputs.environment }}
          SLACK_WEBHOOK_URL: ${{ secrets.WIRE_CELLS_E2E_TEST_BOT_WEBHOOK_URL }}
        with:
          status: ${{ job.status }}
          text: |
            ✅ Cells Critical Flow E2E Tests on **${{ env.ENV }}** environment succeeded ✅
            **CHANGELOG:** ${{ needs.changelog.outputs.changelog-url }}
            **Triggered by:** ${{ github.triggering_actor }}
            **Build log:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - name: Notify on Wire if failed
        if: failure()
        continue-on-error: true
        uses: 8398a7/action-slack@293f8dc0f9731ac35321056641cdef895f4f65f8
        env:
          ENV: ${{ inputs.environment }}
          SLACK_WEBHOOK_URL: ${{ secrets.WIRE_CELLS_E2E_TEST_BOT_WEBHOOK_URL }}
        with:
          status: ${{ job.status }}
          text: |
            ❌ Cells Critical Flow E2E Tests on **${{ env.ENV }}** environment failed ❌
            **CHANGELOG:** ${{ needs.changelog.outputs.changelog-url }}
            **Triggered by:** ${{ github.triggering_actor }}
            **Build log:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
