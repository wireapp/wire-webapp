name: Create Release Artifact

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'tagname for the Artifact'
        required: true
        type: string

      create_release:
        description: 'Wether or not a release entry should be created on github'
        required: false
        default: true
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create_image:
    runs-on: ubuntu-24.04

    env:
      UNIT_TEST_REPORT_FILE: './unit-tests.log'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Add repository Yarn wrapper to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install JS dependencies
        run: ./bin/yarn --immutable

      - name: Set short sha
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set webapp build metadata
        id: webapp_build_metadata
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          SOURCE_COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "${RELEASE_TAG}" == *production* ]]; then
            build_version="$(./bin/yarn ts-node --project ./tsconfig.bin.json ./bin/releaseMetadataCli.ts webapp-build-version "${RELEASE_TAG}" "${SOURCE_COMMIT_SHA}" development)"
          else
            build_version="$(./bin/yarn ts-node --project ./tsconfig.bin.json ./bin/releaseMetadataCli.ts webapp-build-version '' "${SOURCE_COMMIT_SHA}" development)"
          fi

          {
            echo "version=${build_version}"
            echo "commit_sha=${SOURCE_COMMIT_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Test
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          SHORT_COMMIT_SHA: ${{ steps.vars.outputs.sha_short }}
        run: |
          set -o pipefail
          ./bin/yarn nx run-many -t test --all -- --coverage --coverage-reporters=lcov --detectOpenHandles=false 2>&1 | tee ${{ env.UNIT_TEST_REPORT_FILE }}
          echo -e "RELEASE TAG = ${RELEASE_TAG}" >> ${{ env.UNIT_TEST_REPORT_FILE }}
          echo -e "SHORT COMMIT SHA = ${SHORT_COMMIT_SHA}" >> ${{ env.UNIT_TEST_REPORT_FILE }}
          echo -e "TEST RUN DATE = $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> ${{ env.UNIT_TEST_REPORT_FILE }}

      - name: Build and package public production
        if: ${{ contains(inputs.tag, 'production') }}
        env:
          WIRE_WEBAPP_BUILD_COMMIT: ${{ steps.webapp_build_metadata.outputs.commit_sha }}
          WIRE_WEBAPP_BUILD_VERSION: ${{ steps.webapp_build_metadata.outputs.version }}
        run: ./bin/yarn build:prod:public

      - name: Build and package internal production
        if: ${{ !contains(inputs.tag, 'production') }}
        env:
          WIRE_WEBAPP_BUILD_COMMIT: ${{ steps.webapp_build_metadata.outputs.commit_sha }}
          WIRE_WEBAPP_BUILD_VERSION: ${{ steps.webapp_build_metadata.outputs.version }}
        run: ./bin/yarn build:prod

      - name: Push Docker image
        env:
          DOCKER_PASSWORD: ${{secrets.WEBTEAM_QUAY_PASSWORD}}
          DOCKER_USERNAME: ${{secrets.WEBTEAM_QUAY_USERNAME}}
          RELEASE_TAG: ${{ inputs.tag }}
          SHORT_COMMIT_SHA: ${{ steps.vars.outputs.sha_short }}
        run: ./bin/yarn nx run workspace-tools:docker -- "${RELEASE_TAG}-${SHORT_COMMIT_SHA}"

      - name: Upload unit-tests.log to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-1
          RELEASE_TAG: ${{ inputs.tag }}
          SHORT_COMMIT_SHA: ${{ steps.vars.outputs.sha_short }}
        run: |
          TIMESTAMP=$(date -u +'%Y%m%dT%H%M%SZ')
          aws s3 cp ${{ env.UNIT_TEST_REPORT_FILE }} "s3://wire-webapp/unit-tests-release-${RELEASE_TAG}-${TIMESTAMP}-${SHORT_COMMIT_SHA}.log"

      - name: Create GitHub release
        if: ${{inputs.create_release}}
        id: create_release_production
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        env:
          GITHUB_TOKEN: ${{github.token}}
        with:
          tag_name: ${{inputs.tag}}
          name: ${{inputs.tag}}
          files: ${{ env.UNIT_TEST_REPORT_FILE }}
          draft: false
          prerelease: true
