---
name: E2E Tests

on:
  # Options for the workflow when it's manually triggered
  workflow_dispatch:
    inputs:
      webappUrl:
        type: choice
        description: Webapp URL to run the tests against
        required: true
        options:
          - https://wire-webapp-dev.wire.com/
          - https://wire-webapp-qa.zinfra.io/
      grep:
        type: string
        description: Define which tests to run, the given value will be passed to the `--grep` flag of playwright
        default: '@regression|@crit-flow-web'
      testinyRunName:
        type: string
        description: Define Testiny Run name to upload results to
      keep_traces:
        description: 'Attach traces to HTML report'
        type: boolean
        default: false
  # Options for calling the workflow within an other workflow
  workflow_call:
    inputs:
      webappUrl:
        type: string
        required: true
      grep:
        type: string
        description: Define which tests to run, the given value will be passed to the `--grep` flag of playwright
      testinyRunName:
        type: string
        required: false
        description: Define Testiny Run name to upload results to
      keep_traces:
        type: boolean
        description: 'Keep Playwright traces'
        default: false
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true
      WIRE_E2E_TEST_BOT_WEBHOOK_URL:
        required: false
      TESTINY_API_KEY:
        required: false
    outputs:
      reportArtifactId:
        description: ID of the playwright report artifact
        value: ${{ jobs.e2e-report.outputs.reportArtifactId }}
      reportUrl:
        description: URL to the playwright report artifact
        value: ${{ jobs.e2e-report.outputs.reportUrl }}

env:
  BACKEND_URL: https://staging-nginz-https.zinfra.io/

jobs:
  bootstrap_smoke_test:
    name: Run bootstrap smoke test
    runs-on: ubuntu-24.04

    services:
      testservice:
        image: quay.io/wire/testservice:80a5c186821531c55ea3da3bdc67cac3c51f5f2c
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Add repository Yarn wrapper to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - run: ./bin/yarn --immutable

      - run: ./bin/yarn playwright install --only-shell --with-deps chromium
      - uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4

      - name: Generate env file
        run: op inject -i apps/webapp/test/e2e_tests/.env.tpl -o apps/webapp/test/e2e_tests/.env
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Run bootstrap smoke test
        env:
          WEBAPP_URL: ${{ inputs.webappUrl }}
          TEST_SERVICE_URL: http://localhost:8080
        run: ./bin/yarn playwright test -c apps/webapp/playwright.config.ts apps/webapp/test/e2e_tests/specs/CriticalFlow/startupHasNoConsoleErrors.spec.ts

  # Since not always all e2e tests are run the number of shards to start up is computed dynamically from the amount of tests which will run
  compute_shards:
    name: Compute number of shards to use
    runs-on: ubuntu-24.04

    outputs:
      matrixShards: ${{ steps.computeShards.outputs.matrixShards }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Add repository Yarn wrapper to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: ./bin/yarn --immutable

      - name: Compute shards
        id: computeShards
        env:
          GREP: ${{ inputs.grep }}
        run: |
          NUMBER_OF_TESTS=$(./bin/yarn nx run webapp:e2e --list --grep=\"$GREP\" | grep 'Total:' | awk '{print $2}')
          NUMBER_OF_SHARDS=$(( $NUMBER_OF_TESTS > 64 ? 64 : $NUMBER_OF_TESTS )) # Limit the number of shards to 64
          MATRIX_SHARDS=$(jq -nc --argjson len "$NUMBER_OF_SHARDS" '[range(1; $len + 1)]')
          echo "matrixShards=$MATRIX_SHARDS" >> $GITHUB_OUTPUT
          echo "$NUMBER_OF_TESTS tests will be run across $NUMBER_OF_SHARDS shards"

  test:
    name: Run E2E Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [bootstrap_smoke_test, compute_shards]
    container:
      image: quay.io/wire/mirror-images/playwright:v1.61.1-noble
      options: --ipc=host

    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.compute_shards.outputs.matrixShards) }}

    services:
      # Run the kalium testservice as service container of the current job
      # (The tag specifies the commit in kalium to use for tests, see https://quay.io/repository/wire/testservice?tab=history for the latest version)
      testservice:
        image: quay.io/wire/testservice:80a5c186821531c55ea3da3bdc67cac3c51f5f2c
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Add repository Yarn wrapper to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: ./bin/yarn --immutable

      - name: Install 1Password CLI
        run: |
          curl --fail --silent --show-error --location \
            --output /tmp/1password-cli.deb \
            https://downloads.1password.com/linux/debian/amd64/stable/1password-cli-amd64-latest.deb
          dpkg -i /tmp/1password-cli.deb
          op --version

      - name: Generate env file
        run: op inject -i apps/webapp/test/e2e_tests/.env.tpl -o apps/webapp/test/e2e_tests/.env
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Run tests
        env:
          WEBAPP_URL: ${{ inputs.webappUrl }}
          TEST_SERVICE_URL: http://testservice:8080
          PLAYWRIGHT_BLOB_OUTPUT_DIR: apps/webapp/playwright-report/blob-reports
          GREP: ${{ inputs.grep }}
        run: ./bin/yarn nx run webapp:e2e --shard=${{ matrix.shard }}/${{ strategy.job-total }} --reporter=blob --grep=\"$GREP\"

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: blob-report-${{ matrix.shard }}
          path: apps/webapp/playwright-report/blob-reports
          retention-days: 1

  e2e-report:
    runs-on: ubuntu-24.04
    if: ${{ !cancelled() }}
    needs: [test]
    timeout-minutes: 20

    env:
      PLAYWRIGHT_REPORT_PATH: apps/webapp/playwright-report

    # It's necessary to define the outputs of the job so the calling workflow can access them
    outputs:
      reportArtifactId: ${{ steps.generate-outputs.outputs.reportArtifactId }}
      reportUrl: ${{ steps.generate-outputs.outputs.reportUrl }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Add repository Yarn wrapper to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - run: ./bin/yarn --immutable

      - name: Download blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: ./apps/webapp/playwright-report/blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge playwright reports
        working-directory: apps/webapp
        run: |
          ../../bin/yarn playwright merge-reports --config ./playwright.config.ts playwright-report/blob-reports
          rm -rf playwright-report/blob-reports

      - name: Upload test report
        id: upload_playwright_report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report
          path: ${{ env.PLAYWRIGHT_REPORT_PATH }}/

      - name: Generate outputs
        id: generate-outputs
        run: |
          echo "reportUrl=${{ steps.upload_playwright_report.outputs.artifact-url }}" >> $GITHUB_OUTPUT
          echo "reportArtifactId=${{ steps.upload_playwright_report.outputs.artifact-id }}" >> $GITHUB_OUTPUT

      - name: Update Testiny Run with results
        if: ${{ success() && inputs.testinyRunName }}
        env:
          TESTINY_API_KEY: ${{ secrets.TESTINY_API_KEY }}
          TESTINY_RUN_NAME: ${{ inputs.testinyRunName }}
        run: |
          if [ -z "$TESTINY_API_KEY" ]; then
            echo "::error::TESTINY_API_KEY secret is required when testinyRunName is provided."
            exit 1
          fi

          node apps/webapp/test/e2e_tests/scripts/send-playwright-results-to-testiny.ts \
            --report apps/webapp/playwright-report/report.json \
            --run-name "$TESTINY_RUN_NAME"
