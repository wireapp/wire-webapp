name: Create Library Release PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: library-release
  cancel-in-progress: false

jobs:
  create-release-pr:
    name: Create Release PR
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: dev
          token: ${{ secrets.OTTO_THE_BOT_GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Configure git
        run: |
          git config user.name "otto-the-bot"
          git config user.email "8736538+otto-the-bot@users.noreply.github.com"

      - name: Create release branch
        run: |
          BRANCH_NAME="chore/library-release-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          echo "RELEASE_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Install dependencies
        run: yarn --immutable

      - name: Lint libraries
        run: yarn nx run-many -t lint --projects=tag:type:lib

      - name: Test libraries
        run: yarn nx run-many -t test --projects=tag:type:lib

      - name: Build libraries
        run: yarn nx run-many -t build --projects=tag:type:lib

      - name: Create version PR
        run: |
          echo "📦 Creating release PR for dev..."
          echo "🔍 Auto-detecting version bump from conventional commits..."

          # Run nx release version to update versions, commit, and tag
          yarn nx release version

          # Check if any commits were created
          COMMITS_AHEAD="$(git rev-list --count "origin/dev..HEAD")"
          if [ "$COMMITS_AHEAD" -eq 0 ]; then
            echo "ℹ️ No new version changes detected. Skipping push and PR creation."
            exit 0
          fi

          # Push the branch with tags
          git push origin "$RELEASE_BRANCH" --follow-tags

          # Create PR using GitHub CLI
          gh pr create \
            --base dev \
            --head "$RELEASE_BRANCH" \
            --title "chore(release): publish libraries [WPB-22420]" \
            --label "publish-to-npm" \
            --body "Automated release PR created by nx release. ⚠️ **Important:** Squash-merge this PR (do not use 'Merge commit')."
        env:
          GITHUB_TOKEN: ${{ secrets.OTTO_THE_BOT_GH_TOKEN }}
