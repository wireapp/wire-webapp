name: Generate test reports

on:
  workflow_dispatch:

jobs:
  generate_test_report:
    runs-on: ubuntu-24.04

    env:
      UNIT_TEST_REPORT_FILE: './unit-tests.log'
      UNIT_TEST_REPORTS_DIRECTORY: './unit-test-reports'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          ref: ${{ github.ref }}

      - name: Capture checked out commit SHA
        run: echo "TESTED_COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Set TITLE
        env:
          PR_TITLE: ${{github.event.pull_request.title || env.COMMIT_MESSAGE}}
        run: echo "TITLE=$PR_TITLE" >> $GITHUB_ENV

      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@d07a454dad7609a92316b57b23c9ccfd4f59af66
        with:
          access_token: ${{github.token}}

      - name: Add repository Yarn wrapper to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Authenticate git clone
        env:
          GH_TOKEN: ${{secrets.OTTO_THE_BOT_GH_TOKEN}}
        run: echo -e "machine github.com\n  login ${GH_TOKEN}" > ~/.netrc

      - name: Install JS dependencies
        run: ./bin/yarn --immutable

      - name: Generate unit test reports
        id: unit_test_reports
        continue-on-error: true
        env:
          BRANCH: ${{ github.ref_name }}
        run: ./bin/yarn ts-node --project ./tsconfig.bin.json ./bin/generateUnitTestReports.ts

      - name: Upload complete unit test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: unit-test-reports
          path: |
            ${{ env.UNIT_TEST_REPORT_FILE }}
            ${{ env.UNIT_TEST_REPORTS_DIRECTORY }}/manifest.json
            ${{ env.UNIT_TEST_REPORTS_DIRECTORY }}/*.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail when manifest contains failed projects
        if: always()
        run: |
          node -e '
            const manifest = require("./unit-test-reports/manifest.json");
            if (manifest.overallStatus !== "passed") {
              process.exit(1);
            }
          '
