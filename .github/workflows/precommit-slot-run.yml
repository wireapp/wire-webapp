---
name: precommit-slot-run

on:
  workflow_call:
    inputs:
      env_name:
        type: string
        required: true
      backendUrl:
        type: string
        required: true
      artifact_name:
        type: string
        required: false
        default: build-artifact
      expectedBackendRest:
        type: string
        required: false
      expectedBackendWs:
        type: string
        required: false
      expectedVersion:
        type: string
        required: false
      grep:
        type: string
        required: false
      testinyRunName:
        type: string
        required: false
      notify_deployoholics_on_failure:
        type: boolean
        required: false
        default: false
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true
      WEBTEAM_AWS_ACCESS_KEY_ID:
        required: true
      WEBTEAM_AWS_SECRET_ACCESS_KEY:
        required: true
      WIRE_DEPLOYOHOLICS_WEBHOOK_URL:
        required: false
      TESTINY_API_KEY:
        required: false
    outputs:
      precommit_url:
        description: URL of the deployed precommit environment
        value: ${{ jobs.deploy_to_aws.outputs.precommit_url }}
      reportArtifactId:
        description: ID of the playwright report artifact
        value: ${{ jobs.e2e_tests.outputs.reportArtifactId }}
      reportUrl:
        description: URL of the playwright report artifact
        value: ${{ jobs.e2e_tests.outputs.reportUrl }}

concurrency:
  group: precommit-slot-${{ inputs.env_name }}
  cancel-in-progress: false

jobs:
  deploy_to_aws:
    name: Deploy to precommit
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      AWS_REGION: eu-central-1

    outputs:
      precommit_url: ${{ steps.fetch_url.outputs.url }}

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ inputs.artifact_name }}

      - name: Validate precommit environment
        env:
          ENV_NAME: ${{ inputs.env_name }}
        run: |
          case "$ENV_NAME" in
            wire-webapp-precommit|wire-webapp-precommit-1|wire-webapp-precommit-2|wire-webapp-precommit-3)
              ;;
            *)
              echo "Invalid precommit environment: $ENV_NAME"
              exit 1
              ;;
          esac

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          aws-access-key-id: ${{ secrets.WEBTEAM_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.WEBTEAM_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to precommit environment
        id: deploy
        uses: aws-actions/aws-elasticbeanstalk-deploy@1f56e4e813ae4eb167e69ca324234c336c1df573
        with:
          aws-region: ${{ env.AWS_REGION }}
          application-name: Webapp
          environment-name: ${{ inputs.env_name }}
          version-label: ${{ github.run_id }}-${{ github.run_attempt }}
          deployment-package-path: ebs.zip
          wait-for-deployment: true
          wait-for-environment-recovery: true
          use-existing-application-version-if-available: true

      - name: Set precommit URL
        id: fetch_url
        env:
          ENV_NAME: ${{ inputs.env_name }}
        run: |
          echo "Deploying to precommit environment: $ENV_NAME"
          echo "Resolved precommit URL: https://$ENV_NAME.zinfra.io/"
          echo "url=https://$ENV_NAME.zinfra.io/" >> "$GITHUB_OUTPUT"

      - name: Verify precommit runtime backend
        if: ${{ inputs.expectedBackendRest && inputs.expectedBackendWs }}
        env:
          EXPECTED_BACKEND_REST: ${{ inputs.expectedBackendRest }}
          EXPECTED_BACKEND_WS: ${{ inputs.expectedBackendWs }}
          EXPECTED_VERSION: ${{ inputs.expectedVersion }}
          PRECOMMIT_URL: ${{ steps.fetch_url.outputs.url }}
        run: |
          set -euo pipefail

          normalize_url() {
            printf '%s' "${1%/}"
          }

          expected_backend_rest="$(normalize_url "${EXPECTED_BACKEND_REST}")"
          expected_backend_ws="$(normalize_url "${EXPECTED_BACKEND_WS}")"

          for attempt_number in {1..10}; do
            runtime_config="$(curl --fail --silent --show-error "${PRECOMMIT_URL}config.js" || true)"
            actual_backend_rest="$(printf '%s' "${runtime_config}" | sed -n 's/.*"BACKEND_REST":"\([^"]*\)".*/\1/p')"
            actual_backend_ws="$(printf '%s' "${runtime_config}" | sed -n 's/.*"BACKEND_WS":"\([^"]*\)".*/\1/p')"
            actual_version="$(printf '%s' "${runtime_config}" | sed -n 's/.*"VERSION":"\([^"]*\)".*/\1/p')"

            if [[ "$(normalize_url "${actual_backend_rest}")" == "${expected_backend_rest}" && "$(normalize_url "${actual_backend_ws}")" == "${expected_backend_ws}" && ( -z "${EXPECTED_VERSION}" || "${actual_version}" == "${EXPECTED_VERSION}" ) ]]; then
              exit 0
            fi

            echo "Precommit runtime configuration does not match the current artifact and Staging backend on attempt ${attempt_number}: REST=${actual_backend_rest:-missing}, WS=${actual_backend_ws:-missing}, VERSION=${actual_version:-missing}." >&2
            sleep 6
          done

          echo "Precommit runtime configuration did not match the expected Staging endpoints and artifact version." >&2
          exit 1

      - name: Deployment Status
        if: ${{ always() }}
        run: |
          if [[ "${{ steps.deploy.outcome }}" == "success" ]]; then
            echo "Deployment completed successfully"
          else
            echo "Deployment failed"; exit 1
          fi

  e2e_tests:
    name: E2E Tests Execution
    needs: [deploy_to_aws]
    if: ${{ success() && github.repository == 'wireapp/wire-webapp' }}
    uses: ./.github/workflows/e2e-tests.yml
    with:
      webappUrl: ${{ needs.deploy_to_aws.outputs.precommit_url }}
      backendUrl: ${{ inputs.backendUrl }}
      grep: ${{ inputs.grep }}
      testinyRunName: ${{ inputs.testinyRunName }}
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      TESTINY_API_KEY: ${{ secrets.TESTINY_API_KEY }}

  notify_deployoholics:
    name: Notify Deployoholics about failed critical flow
    runs-on: ubuntu-24.04
    needs: [deploy_to_aws, e2e_tests]
    if: ${{ always() && inputs.notify_deployoholics_on_failure && needs.e2e_tests.result == 'failure' }}
    permissions:
      contents: read

    steps:
      - name: Checkout notification action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: .github/actions/notify-deployoholics

      - name: Announce failed critical flow
        uses: ./.github/actions/notify-deployoholics
        with:
          webhook-url: ${{ secrets.WIRE_DEPLOYOHOLICS_WEBHOOK_URL }}
          status: failure
          text: |
            ❌ Playwright Critical Flow failed ❌

            Workflow: ${{ github.workflow }}
            Triggered by: ${{ github.actor }}
            Event: ${{ github.event_name }}
            Ref: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Environment: ${{ inputs.env_name }}
            Build log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Report: ${{ needs.e2e_tests.outputs.reportUrl || 'unavailable' }}
