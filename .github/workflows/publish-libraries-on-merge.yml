name: Publish packages to npm

on:
  pull_request:
    types: [closed]
    branches:
      - dev

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-libraries
  cancel-in-progress: false

jobs:
  publish:
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'publish-to-npm')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Pin to the exact merge commit to avoid publishing code from a newer dev head
          # if other PRs merge between trigger and job start
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "otto-the-bot"
          git config user.email "8736538+otto-the-bot@users.noreply.github.com"

      - name: Install dependencies
        run: yarn --immutable

      - name: Build libraries
        run: yarn nx run-many -t build --projects=tag:type:lib

      - name: Publish to npm
        run: |
          echo "📦 Publishing release to npm..."
          yarn nx release publish --verbose
        env:
          DOTENV_CONFIG_QUIET: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
